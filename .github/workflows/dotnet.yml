name: .NET

# on:
#   push:
#     branches: [ main ]
#   pull_request:
#     branches: [ main ]
permissions:
  id-token: write   # required for GitHub OIDC

on:
  push:
    tags:
      - "vRelease*"
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
    - uses: actions/checkout@v2


    - name: Setup .NET 10
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x

    - name: pack
      run: | 
        cd src     
        dotnet tool restore
        dotnet r pack
        
    - name: NuGet Login
      uses: NuGet/login@v1
      id: login
      with:
        user: ignatandrei

    - name: push to nuget
      run: |
          dotnet nuget push ${{github.workspace}}/src/RSCG_Static/PACK/*symb*.*pkg --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json

